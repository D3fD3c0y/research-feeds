
name: Update Feeds (Every 8 hours UTC)

on:
  schedule:
    - cron: "5 */8 * * *"   # Every 8 hours (UTC)
  workflow_dispatch:        # Manual trigger button

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit index.html and feeds/*.xml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 feedparser

      - name: Set Pages base URL
        run: echo "PAGES_BASE=https://d3fd3c0y.github.io/research-feeds/" >> $GITHUB_ENV

      - name: Build feeds
        run: |
          python build_feeds.py | tee run.log

      # Option A: Upload generated outputs as artifacts (per-run)
      - name: Upload feed outputs
        uses: actions/upload-artifact@v4
        with:
          name: feed-output-run${{ github.run_number }}-${{ github.sha }}
          path: |
            feeds/
            index.html
            artifacts/
          if-no-files-found: warn
          retention-days: 7

      - name: Upload run log
        uses: actions/upload-artifact@v4
        with:
          name: feed-run-log-run${{ github.run_number }}-${{ github.sha }}
          path: run.log
          retention-days: 7

      - name: Commit & push changes
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git add -A
          git commit -m "Auto-update feeds" || echo "No changes"
          git push
