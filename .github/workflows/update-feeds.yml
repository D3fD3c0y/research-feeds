name: Update Feeds (Every 8 hours UTC)

on:
  schedule:
    - cron: "5 */8 * * *"   # Every 8 hours (UTC)
  workflow_dispatch:        # Manual trigger button

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit index.html and feeds/*.xml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 feedparser

      - name: Set Pages base URL
        run: echo "PAGES_BASE=https://d3fd3c0y.github.io/research-feeds/" >> $GITHUB_ENV

      - name: Build feeds
        run: |
          python build_feeds.py | tee run.log

      - name: Upload run log
        uses: actions/upload-artifact@v4
        with:
          name: feed-run-log
          path: run.log

      - name: Commit & push changes
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          # Stage all changes (safe even if feeds/*.xml does not exist yet)
          git add -A
          # Commit without failing when there is nothing to commit
          git commit -m "Auto-update feeds" || echo "No changes"
          # Push to the current branch
          git push
